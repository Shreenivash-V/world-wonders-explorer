<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Wonders Explorer</title>

    <link rel="stylesheet" href="style.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        header{
            background:#0f172a;
            color:white;
            text-align:center;
            padding:20px;
        }

        .controls{
            padding:20px;
            text-align:center;
        }

        #searchInput{
            width:90%;
            max-width:500px;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        #loader{
            text-align:center;
            font-size:18px;
            padding:20px;
        }

        #wondersContainer{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:20px;
            padding:20px;
        }

        .card{
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card img{
            width:100%;
            height:250px;
            object-fit:cover;
            display:block;
        }

        .card-content{
            padding:15px;
        }

        .card-content h2{
            margin-bottom:10px;
        }

        .card-content button{
            margin-top:10px;
            padding:10px 15px;
            border:none;
            background:#2563eb;
            color:white;
            border-radius:6px;
            cursor:pointer;
        }

        .card-content button:hover{
            background:#1d4ed8;
        }
    </style>
</head>
<body>

<header>
    <h1>🌍 World Wonders Explorer</h1>
    <p>Discover Famous Wonders Around The World</p>
</header>

<div class="controls">
    <input
        type="text"
        id="searchInput"
        placeholder="Search wonder..."
    >
</div>

<div id="loader" style="display:none;">
    Loading Wonders...
</div>

<div id="wondersContainer"></div>

<script src="script.js"></script>

</body>
</html>
